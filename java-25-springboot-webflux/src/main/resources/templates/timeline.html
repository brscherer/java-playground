<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Feed PoC</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.0.4/sse.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5; color: #1a1a2e; line-height: 1.5;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .header {
            background: #fff; border-bottom: 1px solid #e0e0e0;
            padding: 12px 16px; position: sticky; top: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 20px; font-weight: 700; }
        .header .user-info { font-size: 13px; color: #65676b; }

        .create-form {
            background: #fff; border-radius: 8px; padding: 16px;
            margin: 16px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .create-form textarea {
            width: 100%; border: 1px solid #e0e0e0; border-radius: 8px;
            padding: 12px; font-size: 14px; resize: none; min-height: 60px;
            font-family: inherit;
        }
        .create-form textarea:focus { outline: none; border-color: #1a73e8; }
        .create-form .actions {
            display: flex; justify-content: flex-end; margin-top: 8px;
        }
        .create-form button {
            background: #1a73e8; color: #fff; border: none;
            border-radius: 20px; padding: 8px 20px; font-size: 14px;
            font-weight: 600; cursor: pointer;
        }
        .create-form button:hover { background: #1557b0; }
        .create-form button:disabled { opacity: 0.6; cursor: default; }

        #post-list { display: flex; flex-direction: column; gap: 8px; }

        .post {
            background: #fff; border-radius: 8px; padding: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .post .author {
            font-weight: 700; font-size: 14px; margin-bottom: 4px;
        }
        .post .content { font-size: 15px; margin-bottom: 8px; word-wrap: break-word; }
        .post .meta { font-size: 12px; color: #65676b; }

        .load-more {
            text-align: center; margin: 16px 0;
        }
        .load-more button {
            background: none; border: 1px solid #e0e0e0; border-radius: 20px;
            padding: 8px 24px; font-size: 14px; color: #65676b; cursor: pointer;
        }
        .load-more button:hover { background: #f0f2f5; }

        .sse-indicator {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: #65676b; padding: 8px 0;
        }
        .sse-indicator .dot {
            width: 8px; height: 8px; border-radius: 50%; background: #31a24c;
            display: inline-block;
        }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1a73e8; color: #fff; padding: 12px 20px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Feed</h1>
        <div class="user-info">
            <span th:text="${currentUser.displayName}">User</span>
            &middot;
            <span th:text="${followerCount}">0</span> followers
        </div>
    </div>

    <div class="container">
        <div class="create-form">
            <form hx-post="/posts"
                  hx-target="#post-list"
                  hx-swap="afterbegin"
                  hx-on::after-request="this.reset()">
                <input type="hidden" name="userId" value="1">
                <textarea name="content" placeholder="What's on your mind?" maxlength="500" required></textarea>
                <div class="actions">
                    <button type="submit" hx-disable>Post</button>
                </div>
            </form>
        </div>

        <div class="sse-indicator" id="sse-status">
            <span class="dot"></span>
            <span>Live</span>
        </div>

        <div id="post-list"
             hx-ext="sse"
             sse-connect="/timeline/stream?userId=1"
             sse-swap="new-post"
             hx-swap="afterbegin">
            <div th:each="post : ${posts}" class="post"
                 th:attrappend="data-timestamp=${post.getCreatedAt().toEpochMilli()}"
                 th:id="|post-${post.getId()}|">
                <div class="author" th:text="${authors != null && authors.containsKey(post.getUserId()) ? authors.get(post.getUserId()).getDisplayName() : 'Unknown'}">
                    Author
                </div>
                <div class="content" th:text="${post.getContent()}">Content</div>
                <div class="meta" th:text="${#temporals.format(post.getCreatedAt(), 'MMM d, yyyy h:mm a')}">Date</div>
            </div>
        </div>

        <div class="load-more" th:if="${posts.size() >= 20}">
            <form>
                <button hx-get="/timeline/older?userId=1&amp;before="
                        hx-vals="js:{before: (document.querySelector('#post-list .post:last-child')?.getAttribute('data-timestamp') || 0)}"
                        hx-target="#post-list"
                        hx-swap="beforeend">
                    Load more
                </button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var latestTimestamp = [[${latestTimestamp}]];
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target && evt.detail.target.id === 'post-list') {
                updateTimestamp();
            }
        });
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            var el = evt.detail.requestConfig.elt;
            if (el && el.getAttribute('hx-post') === '/posts') {
                var btn = el.querySelector('button[type=submit]');
                if (btn) btn.disabled = true;
            }
        });
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            var el = evt.detail.requestConfig.elt;
            if (el && el.getAttribute('hx-post') === '/posts') {
                var btn = el.querySelector('button[type=submit]');
                if (btn) btn.disabled = false;
                if (evt.detail.successful) showToast('Post created!');
            }
        });
        function updateTimestamp() {
            var items = document.querySelectorAll('#post-list .post');
            if (items.length > 0) {
                var ts = items[0].getAttribute('data-timestamp');
                if (ts) latestTimestamp = Math.max(latestTimestamp, parseInt(ts));
            }
        }
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }
    </script>
</body>
</html>
