<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div id="task-list-container" th:fragment="task-list" hx-swap-oob="true">
    <div class="stats">
        <span>Total: <strong th:text="${stats.total}">0</strong></span>
        <span>Done: <strong th:text="${stats.done}">0</strong></span>
        <span>Pending: <strong th:text="${stats.pending}">0</strong></span>
    </div>

    <div th:if="${#lists.isEmpty(tasks)}" style="color: var(--pico-muted-color);">
        No tasks yet. Add one above!
    </div>

    <table th:if="${not #lists.isEmpty(tasks)}">
        <tbody>
            <tr th:each="task : ${tasks}"
                th:data-id="${task.id}"
                style="opacity: 1; transition: opacity 200ms;">
                <td>
                    <div class="task-row">
                        <form th:hx-post="@{/tasks/{id}/toggle(id=${task.id})}"
                              hx-target="#task-list-container"
                              hx-swap="outerHTML"
                              hx-trigger="change">
                            <input type="checkbox"
                                   th:checked="${task.done}"
                                   onchange="this.closest('form').requestSubmit()">
                        </form>
                        <span th:text="${task.title}"
                              th:classappend="${task.done} ? 'done' : ''">
                        </span>
                        <button class="delete-btn"
                                th:hx-delete="@{/tasks/{id}(id=${task.id})}"
                                hx-target="#task-list-container"
                                hx-swap="outerHTML"
                                hx-confirm="Delete this task?"
                                style="background: none; border: none; cursor: pointer; color: var(--pico-del-color);">
                            ✕
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
